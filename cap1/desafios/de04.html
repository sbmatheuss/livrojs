<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafios</title>
</head>
<body>
    <h1>Calcule e informe a média das notas</h1>
    <script>
      const n1 = Number(prompt("Nota 1: "))
      const n2 = Number(prompt("Nota 2: "))
      const media = (n1+n2) / 2
      alert(`Média: ${media}`)
    </script>
</body>
</html>
