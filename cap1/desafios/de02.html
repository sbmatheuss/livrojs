<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafios</title>

<body>
    <h1>Calcule e informe o valor a ser pago por cliente</h1>
    <script>
      const conta = Number(prompt("Valor da conta R$: "))
      const cliente = Number(prompt("Números de Cliente: "))
      const total = conta/cliente
      alert(`Valor por cliente ${total}`)
    </script>
</body>
