<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS</title>
</head>
<body>
      <h1>Cálculo da duração de horas de uma viagem</h1>
      <script>
        const dias = Number(prompt("N Dias: ")) // lê os dados de entrada
        const horas = Number(prompt("N Horas: ")) 
        const total = (dias*24) + horas // cálcula a duração
        alert(`Total de Horas: ${total}`) // exibe o total
      </script>
</body>
</html>
