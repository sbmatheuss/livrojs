<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programa Concurso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #fff;
      color: #000;
    }

    h2 {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1rem;
    }

    .form-area {
      margin-bottom: 0.75rem;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .form-row label {
      font-size: 14px;
      width: 90px;
    }

    .form-row input {
      width: 180px;
      height: 24px;
      font-size: 13px;
      padding: 0 6px;
      border: 1px solid #999;
      border-radius: 2px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    button {
      height: 26px;
      padding: 0 12px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 2px;
      background: #f0f0f0;
      color: #000;
    }

    button:hover {
      background: #e0e0e0;
    }

    #btn-add {
      height: 24px;
      padding: 0 10px;
      font-size: 13px;
    }

    #lista {
      font-size: 14px;
      line-height: 1.9;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <h2>Programa Concurso</h2>

  <div class="form-area">
    <div class="form-row">
      <label for="inp-nome">Candidato:</label>
      <input type="text" id="inp-nome" />
      <button id="btn-add">Adicionar</button>
    </div>
    <div class="form-row">
      <label for="inp-acertos">Nº Acertos:</label>
      <input type="number" id="inp-acertos" min="0" />
    </div>
  </div>

  <div class="btn-row">
    <button id="btn-listar">Listar Todos</button>
    <button id="btn-fase2">Aprovados 2ª Etapa</button>
  </div>

  <div id="lista"></div>

  <script src="script.js"></script>

</body>
</html>
