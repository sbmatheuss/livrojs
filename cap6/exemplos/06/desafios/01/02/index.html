<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        input { margin-bottom: 10px; }
        .lista { margin-top: 15px; font-weight: bold; }
        .resultado { margin-top: 10px; color: blue; }
    </style>
</head>
<body>

    <h2>Programa Adicionar Números</h2>
    
    <label for="inNumero">Número:</label>
    <input type="number" id="inNumero" focus>
    <button id="btAdicionar">Adicionar</button>
    <button id="btVerificar">Verificar Ordem</button>

    <div class="lista" id="outLista">Números: </div>
    <div class="resultado" id="outResposta"></div>

    <script src="script.js"></script>
</body>
</html>
